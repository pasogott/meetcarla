name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach the DMG to
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos-dmg:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.10.9"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Recreate bundled transcription runtime
        run: |
          rm -rf .venv
          python -m venv --copies .venv
          uv pip install --python .venv/bin/python -r requirements-transcription.txt
          .venv/bin/python -c "import whisper, huggingface_hub, mlx_whisper"

      - name: Build DMG
        run: pnpm tauri build --bundles dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: src-tauri/target/release/bundle/dmg/*.dmg
